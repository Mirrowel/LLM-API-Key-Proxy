name: Cleanup Feature Builds

on:
  delete:
  workflow_dispatch:
    inputs:
      cleanup_mode:
        description: 'Cleanup mode'
        required: true
        type: choice
        default: branch
        options:
          - branch
          - stale_branches
      branch_name:
        description: 'Branch name for branch mode. Leave empty for stale_branches.'
        required: false
        type: string
        default: ''
      keep_latest:
        description: 'Keep newest N matching releases. 0 deletes all matches.'
        required: false
        type: string
        default: '0'
      dry_run:
        description: 'Dry run mode (preview without deleting)'
        required: false
        type: boolean
        default: false

jobs:
  delete-releases:
    if: github.event_name == 'workflow_dispatch' || github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PROTECTED_BRANCHES: "main,master,production,prod,staging,develop,dev"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine cleanup config
        id: config
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CLEANUP_MODE="${{ github.event.inputs.cleanup_mode }}"
            BRANCH_NAME="${{ github.event.inputs.branch_name }}"
            KEEP_LATEST="${{ github.event.inputs.keep_latest }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          else
            CLEANUP_MODE="branch"
            BRANCH_NAME="${{ github.event.ref }}"
            KEEP_LATEST="0"
            DRY_RUN="false"
          fi

          case "$CLEANUP_MODE" in
            branch|stale_branches) ;;
            *) echo "Unsupported cleanup mode: $CLEANUP_MODE" >&2; exit 1 ;;
          esac

          if ! printf '%s\n' "$KEEP_LATEST" | grep -Eq '^[0-9]+$'; then
            echo "keep_latest must be a non-negative integer, got: $KEEP_LATEST" >&2
            exit 1
          fi

          if [ "$CLEANUP_MODE" = "branch" ] && [ -z "$BRANCH_NAME" ]; then
            echo "branch_name is required for branch mode" >&2
            exit 1
          fi

          echo "cleanup_mode=$CLEANUP_MODE" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "keep_latest=$KEEP_LATEST" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

          echo "Mode: $CLEANUP_MODE"
          echo "Branch: ${BRANCH_NAME:-'(none)'}"
          echo "Keep latest: $KEEP_LATEST"
          echo "Dry run: $DRY_RUN"

      - name: Find and process releases
        id: cleanup
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLEANUP_MODE: ${{ steps.config.outputs.cleanup_mode }}
          BRANCH_NAME: ${{ steps.config.outputs.branch_name }}
          KEEP_LATEST: ${{ steps.config.outputs.keep_latest }}
          DRY_RUN: ${{ steps.config.outputs.dry_run }}
        run: |
          is_protected_branch() {
            local branch="$1"
            IFS=',' read -ra protected <<< "$PROTECTED_BRANCHES"
            for item in "${protected[@]}"; do
              item="$(echo "$item" | xargs)"
              if [ "$branch" = "$item" ]; then
                return 0
              fi
            done
            return 1
          }

          branch_exists() {
            git ls-remote --exit-code --heads origin "$1" >/dev/null 2>&1
          }

          releases_for_branch() {
            local branch="$1"
            gh release list --repo "${{ github.repository }}" --limit 1000 --json tagName,createdAt \
              --jq "sort_by(.createdAt) | reverse | .[] | select(.tagName | startswith(\"$branch/\")) | .tagName"
          }

          all_build_releases() {
            gh release list --repo "${{ github.repository }}" --limit 1000 --json tagName,createdAt \
              --jq 'sort_by(.createdAt) | reverse | .[] | select(.tagName | contains("/build-")) | .tagName'
          }

          select_after_retention() {
            local keep="$1"
            if [ "$keep" -eq 0 ]; then
              cat
              return
            fi
            tail -n +$((keep + 1))
          }

          if [ "$CLEANUP_MODE" = "branch" ]; then
            if is_protected_branch "$BRANCH_NAME"; then
              echo "Branch '$BRANCH_NAME' is protected and cannot be cleaned up." >&2
              echo "Protected branches: $PROTECTED_BRANCHES" >&2
              exit 1
            fi
            SEARCH_PATTERN="$BRANCH_NAME/"
            RELEASES="$(releases_for_branch "$BRANCH_NAME" | select_after_retention "$KEEP_LATEST")"
          else
            SEARCH_PATTERN="stale unprotected */build-* releases"
            RELEASES="$({
              all_build_releases | while read -r tag; do
                [ -z "$tag" ] && continue
                branch="${tag%/build-*}"
                if is_protected_branch "$branch"; then
                  continue
                fi
                if branch_exists "$branch"; then
                  continue
                fi
                echo "$tag"
              done
            } | select_after_retention "$KEEP_LATEST")"
          fi

          if [ -z "$RELEASES" ]; then
            echo "No releases matched cleanup mode '$CLEANUP_MODE'."
            echo "searched_pattern=$SEARCH_PATTERN" >> "$GITHUB_OUTPUT"
            echo "release_count=0" >> "$GITHUB_OUTPUT"
            echo "deleted_count=0" >> "$GITHUB_OUTPUT"
            echo "failed_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_COUNT="$(printf '%s\n' "$RELEASES" | grep -c .)"
          echo "Found $RELEASE_COUNT release(s):"
          printf '%s\n' "$RELEASES" | sed 's/^/  - /'

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run only. No releases will be deleted."
            echo "searched_pattern=$SEARCH_PATTERN" >> "$GITHUB_OUTPUT"
            echo "release_count=$RELEASE_COUNT" >> "$GITHUB_OUTPUT"
            echo "deleted_count=0" >> "$GITHUB_OUTPUT"
            echo "failed_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DELETED=0
          FAILED=0
          while read -r tag; do
            [ -z "$tag" ] && continue
            echo "Deleting $tag"
            if gh release delete "$tag" --repo "${{ github.repository }}" --cleanup-tag --yes; then
              DELETED=$((DELETED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            sleep 0.5
          done <<< "$RELEASES"

          echo "searched_pattern=$SEARCH_PATTERN" >> "$GITHUB_OUTPUT"
          echo "release_count=$RELEASE_COUNT" >> "$GITHUB_OUTPUT"
          echo "deleted_count=$DELETED" >> "$GITHUB_OUTPUT"
          echo "failed_count=$FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Generate summary
        shell: bash
        env:
          CLEANUP_MODE: ${{ steps.config.outputs.cleanup_mode }}
          BRANCH_NAME: ${{ steps.config.outputs.branch_name }}
          KEEP_LATEST: ${{ steps.config.outputs.keep_latest }}
          DRY_RUN: ${{ steps.config.outputs.dry_run }}
          PATTERN: ${{ steps.cleanup.outputs.searched_pattern }}
          RELEASE_COUNT: ${{ steps.cleanup.outputs.release_count }}
          DELETED_COUNT: ${{ steps.cleanup.outputs.deleted_count }}
          FAILED_COUNT: ${{ steps.cleanup.outputs.failed_count }}
        run: |
          {
            echo "## Cleanup Summary"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Mode | \`$CLEANUP_MODE\` |"
            echo "| Branch | \`${BRANCH_NAME:-'(none)'}\` |"
            echo "| Search | \`$PATTERN\` |"
            echo "| Keep latest | \`$KEEP_LATEST\` |"
            echo "| Dry run | \`$DRY_RUN\` |"
            echo "| Releases found | $RELEASE_COUNT |"
            echo "| Deleted | $DELETED_COUNT |"
            echo "| Failed | $FAILED_COUNT |"
          } >> "$GITHUB_STEP_SUMMARY"
